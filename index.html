<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
        <a-assets>
        <img id="suelo" src="suelos.jpg">,
        <img id="pared" src="paredes.jpg">,
       <img id="viga" src="vigas.jpg">,
        </a-assets>
      <a-box position="0 0.1 0" rotation="0 0 0" scale="3 0.1 3" src="#suelo"></a-box>
      <a-box position="0 1.7 -1.4" rotation="90 90 90" scale="3 0.2 3" src="#parede"></a-box>
      <a-box position="1.4 1.7 0" rotation="90 0 90" src="#pared"></a-box>
      <a-box position="-1.4 1.7 0" rotation="90 0 90" scale="0.5 0.5 0.5" src="#pared"></a-box>
      <a-box position="-0 3.2 0" rotation="0 0 0" scale="0.5 0.5 0.5" src="#viga"></a-box>
      <a-box position="-0.5 0.45 0.5" rotation="0 45 0" scale="0.5 0.5 0.5" color="#d41620"></a-box>
      <a-light position="3 3 3" type="ambient" color="#FFFFFf"></a-light>
      <a-sphere position="0.5 0.7 0.75" radius="0.5" color="#3278c3"></a-sphere>
      <a-cone position="0.685 0.8 -0.5" color="#7BC8A4" radius-bottom="0.5" radius-top="0" height="1"></a-cone>
      <a-cylinder position="-0.2 1.2 -0.25" radius="0.25" height="2" color="#FFC65D"></a-cylinder>
      <a-sky  position="0 1 0" color="#ECECEC"></a-sky>
      <a-entity id="rig" position="-3 1 3">
  <a-camera id="camera"></a-camera>
</a-entity>
    </a-scene>
  </body>
</html>
